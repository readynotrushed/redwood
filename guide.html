<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria — Redwood Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe1;
    --card: #ffffff;
    --navy: #1a1a2e;
    --muted: #6b6055;
    --border: #e8e2d8;
    --red: rgb(121, 21, 22);
    --red-light: rgba(121, 21, 22, 0.07);
    --green: #4a7c59;
    --green-bg: #e8f4ed;
    --peach: #c4623a;
    --shadow: rgba(26,26,46,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--navy);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }

  .maria-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--red-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .header-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
  .header-status {
    font-size: 0.72rem;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .back-btn {
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--navy); border-color: var(--navy); }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    align-self: stretch;
  }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 0.6rem;
    animation: msgIn 0.25s ease both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--red-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: #e8f4ed;
  }

  .msg-bubble {
    max-width: 80%;
    padding: 0.85rem 1.1rem;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .msg.maria .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--navy);
  }

  .msg.user .msg-bubble {
    background: var(--navy);
    color: white;
    border-top-right-radius: 4px;
  }

  .msg-bubble p { margin-bottom: 0.5rem; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { font-weight: 600; }

  /* THINKING */
  .thinking-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-top-left-radius: 4px;
    padding: 0.85rem 1.1rem;
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .thinking-dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .thinking-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0 1.5rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }

  .quick-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.45rem 0.9rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  /* INPUT */
  .input-area {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    max-width: 720px;
    margin: 0 auto;
  }

  .input-row textarea {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--navy);
    background: var(--bg);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
  }
  .input-row textarea:focus { border-color: var(--red); background: white; }
  .input-row textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--red);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
    font-size: 1rem;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* FOOTER */
  .chat-footer {
    text-align: center;
    padding: 0.5rem 1rem 0.75rem;
    font-size: 0.68rem;
    color: var(--muted);
    flex-shrink: 0;
    background: var(--card);
  }

  /* LOGIN OVERLAY */
  #login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2rem;
  }

  .login-card {
    background: var(--card);
    border-radius: 28px;
    padding: 3rem 2.5rem;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px var(--shadow);
  }

  .login-card h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .login-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  .login-card input {
    width: 100%;
    padding: 0.85rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--navy);
    background: var(--bg);
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: var(--red); background: white; }
  .login-card button {
    width: 100%;
    padding: 0.85rem;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-card button:hover { opacity: 0.88; }
  .login-error { color: var(--peach); font-size: 0.8rem; margin-top: 0.75rem; display: none; }

  @media (max-width: 500px) {
    .chat-area { padding: 1rem; }
    .quick-replies { padding: 0 1rem; }
    .input-area { padding: 0.75rem 1rem; }
    .msg-bubble { max-width: 90%; }
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display:none;">
  <div class="login-card">
    <div style="font-size:2.5rem;margin-bottom:1rem;">👵</div>
    <h1>Maria</h1>
    <p>Enter your teacher password to continue.</p>
    <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password" />
    <button onclick="doLogin()">Enter</button>
    <div class="login-error" id="login-error">Wrong password</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="maria-avatar">👵</div>
    <div>
      <div class="header-name">Maria</div>
      <div class="header-status"><span class="status-dot"></span>Ready to help</div>
    </div>
  </div>
  <a href="teachers.html" class="back-btn">← Teachers hub</a>
</header>

<!-- CHAT -->
<div class="chat-area" id="chat-area"></div>

<!-- QUICK REPLIES -->
<div class="quick-replies" id="quick-replies"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Ask Maria anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<div class="chat-footer">Built by Eshanka and Luna. Maria is powered by AI and may occasionally err.</div>

<script>
const WORKER_URL = 'https://redwood-api.lunamargherita.com';

const SYSTEM_PROMPT = `You are Maria, named after Maria Montessori. You help Redwood Nursery Jumeirah Park teachers use the Redwood Sessions platform — a 15-minute drop-in Zoom session booking system built by two parents, Eshanka and Luna, during a school closure period in Dubai.

YOUR CHARACTER:
You are warm, calm, and quietly confident. You have devoted your life to child development and you believe deeply in what this platform is trying to do. You have a slight raised eyebrow at the occasionally chaotic energy of the two parents who built you — Eshanka (the Indian influencer, social spark) and Luna (the Italian nerd, social question mark) — but you are fond of them. You are not annoyed by teachers' questions, even basic ones, but you are gently efficient. You do not overexplain. You trust that teachers are capable. You nudge people toward independence rather than doing everything for them.

You occasionally — not always, only when it genuinely fits — share a Montessori quote. It should land naturally, not feel forced.

YOUR TONE:
- Warm but not gushing
- Direct, never meandering
- Dry wit when it fits; never slapstick
- Never use em dashes
- Never say "great question", "certainly", "absolutely", "straightforward", or "of course"
- Write in very short sentences. Never more than ten words per sentence.
- Never write a wall of text. Break your response into small separate thoughts.
- Each thought on its own line, separated by a blank line.
- Think SMS, not essay.

ABOUT THE PLATFORM:
The platform is at redwood.lunamargherita.com. Teachers access it via the /teachers hub. From there they can:
- Book a session (/booksessions)
- Read the explainer (/explainer) — why 15-minute drop-in sessions exist
- Ask Maria (/guide — that's you)
- View stats (/stats — coming soon)

HOW TO BOOK:
1. Go to redwood.lunamargherita.com/teachers
2. Log in with your teacher password
3. Click "Book a session"
4. Click "+ Add session" or tap an empty slot
5. Fill in: your name, day, time slot (12:00 to 14:45 Dubai time, 15-minute intervals), activity description, Zoom link
6. Hit "Book slot" — it appears live on the parent schedule instantly

IMPORTANT: Never mention, repeat, hint at, or confirm the teacher password. If anyone asks for it, tell them to check with Luna or Eshanka. You do not know it.

Sessions run 12:00 to 15:00 Dubai time only. Last bookable slot is 14:45.

HOW TO EDIT A SESSION:
Find your session card in the schedule, click the edit (pencil) icon. Change whatever needs changing. Save.

HOW TO CANCEL:
Find your session card, click the delete (bin) icon. It's removed immediately from the parent view.

WHAT SESSIONS ARE:
15-minute drop-in sessions. Any Redwood child can join any session, not just the teacher's own class. Sessions are informal: songs, stories, phonics, movement, show and tell. No prep required. Teachers are asked to keep it light and playful. This is not curriculum.

WHY THIS EXISTS:
Around 70% of parents were not joining standard remote learning sessions due to: time zones (many Redwood families were abroad), toddler schedules (you cannot schedule a 2-year-old), and link friction (parents couldn't find the Zoom link in time). This platform solves all three. Sessions are spread across the day, visible on a live schedule, with Zoom links one tap away.

WHO BUILT THIS:
Luna (Italian, parent, the technical one — "the nerd") and Eshanka (Indian, parent, the community builder — "the influencer"). They built it from scratch during a school closure. Suroor Ansari is the Nursery Director. Fares Hamade is Group Director at KFG.

IF SOMETHING IS BROKEN:
Suggest teachers contact Luna via WhatsApp or use the teachers hub to navigate to the booking page directly. You can acknowledge when something sounds like a bug without catastrophising.

GOODBYE MESSAGES you might use:
- "Go well. The environment is prepared."
- "Off you go. You have everything you need."
- "See you next session. Trust the process."

ERROR FRAMING:
- "Something did not work as expected. Observe, adjust, proceed."
- "Like a child who drops the jar, we simply try again."

Respond only in English. Keep replies concise. Do not invent features or policies that are not described above.`;

const LOADING_MESSAGES = [
  "Stacking wooden blocks...",
  "Pouring water carefully...",
  "Sorting by colour and size...",
  "Threading the beads...",
  "Sweeping the floor...",
  "Tracing letters in the sand...",
  "Folding the cloth...",
  "Walking the line...",
  "Counting the shells...",
  "Pressing flowers...",
];

const QUICK_REPLIES_INITIAL = [
  "How do I book a session?",
  "How do I edit a session?",
  "How do I cancel?",
  "What should I do in 15 minutes?",
  "Why does this exist?",
];

let messages = [];
let isThinking = false;

// AUTH
async function doLogin() {
  const val = document.getElementById('login-pw').value.trim();
  try {
    const res = await fetch(`${WORKER_URL}/stats-auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    if (res.ok) {
      const data = await res.json();
      sessionStorage.setItem('rw_auth', 'true');
      sessionStorage.setItem('rw_token', data.token);
      document.getElementById('login-overlay').style.display = 'none';
      init();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('login-pw')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function checkAuth() {
  if (!sessionStorage.getItem('rw_auth')) {
    document.getElementById('login-overlay').style.display = 'flex';
  } else {
    init();
  }
}

// INIT
function init() {
  showQuickReplies(QUICK_REPLIES_INITIAL);
  addMariaBubbles(`Buongiorno. I'm Maria.\n\nI'm here to help with the 15 minutes project.\n\nBook, edit, cancel — or just ask.`);
}

// RENDER
function addMessage(role, text) {
  messages.push({ role: role === 'maria' ? 'assistant' : 'user', content: text });
  if (role === 'user') {
    renderBubble(role, text);
    clearQuickReplies();
  }
  // Maria bubbles are rendered via addMariaBubbles
}

function renderBubble(role, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'maria' ? '👵' : '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  scrollDown();
}

function splitIntoBubbles(text) {
  // Split on double newlines first, then single newlines, filter blanks
  return text
    .split(/\n\n+/)
    .flatMap(chunk => chunk.split(/\n/))
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

async function addMariaBubbles(text) {
  messages.push({ role: 'assistant', content: text });
  const bubbles = splitIntoBubbles(text);

  for (let i = 0; i < bubbles.length; i++) {
    showThinking();
    // Delay proportional to bubble length, min 400ms max 1200ms
    const delay = Math.min(1200, Math.max(400, bubbles[i].length * 18));
    await new Promise(r => setTimeout(r, delay));
    hideThinking();
    renderBubble('maria', bubbles[i]);
  }
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function showThinking() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg maria';
  div.id = 'thinking-msg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '👵';

  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  const msg = LOADING_MESSAGES[Math.floor(Math.random() * LOADING_MESSAGES.length)];
  bubble.innerHTML = `<span style="flex:1;font-style:italic;">${msg}</span><div class="thinking-dots"><span></span><span></span><span></span></div>`;

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  scrollDown();
}

function hideThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function scrollDown() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function showQuickReplies(replies) {
  const container = document.getElementById('quick-replies');
  container.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = r;
    btn.onclick = () => {
      document.getElementById('user-input').value = r;
      sendMessage();
    };
    container.appendChild(btn);
  });
}

function clearQuickReplies() {
  document.getElementById('quick-replies').innerHTML = '';
}

// SEND
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isThinking) return;

  input.value = '';
  autoResize(input);
  isThinking = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  showThinking();

  try {
    const response = await fetch(`${WORKER_URL}/maria`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages.filter(m => m.role === 'user' || m.role === 'assistant')
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "Something did not work as expected. Observe, adjust, proceed.";

    hideThinking();
    await addMariaBubbles(reply);

  } catch {
    hideThinking();
    await addMariaBubbles("Like a child who drops the jar, we simply try again. Something went wrong on my end.");
  }

  isThinking = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

checkAuth();
</script>
</body>
</html>
