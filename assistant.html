<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redwood Assistant · Jumeirah Park</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: rgb(121, 21, 22);
      --red-light: rgba(121, 21, 22, 0.08);
      --red-mid: rgba(121, 21, 22, 0.15);
      --sage: #4a7c59;
      --peach: #c4623a;
      --bg: #f0ebe1;
      --surface: #faf7f2;
      --text: #1a1a1a;
      --text-muted: #6b6560;
      --border: rgba(121, 21, 22, 0.12);
      --bubble-user-bg: var(--red);
      --bubble-user-text: #fff;
      --bubble-bot-bg: #fff;
      --bubble-bot-border: var(--border);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--sage);
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.2);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.2); }
      50%       { box-shadow: 0 0 0 6px rgba(74, 124, 89, 0.35), 0 0 10px rgba(74, 124, 89, 0.2); }
    }

    .header-typing {
      font-size: 11px;
      color: var(--sage);
      font-style: italic;
      margin-top: 1px;
      height: 14px;
    }

    /* ── Message area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubbles ── */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-row.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 82%;
      width: fit-content;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 16px;
      line-height: 1.6;
      position: relative;
    }

    .bubble.bot {
      background: var(--bubble-bot-bg);
      border: 1px solid var(--bubble-bot-border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-text);
      border-bottom-right-radius: 4px;
    }


    /* Typing indicator */
    .typing-bubble {
      background: var(--bubble-bot-bg);
      border: 1px solid var(--bubble-bot-border);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      border-radius: var(--radius);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Quick replies / starter chips ── */
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      animation: fadeUp 0.3s ease 0.1s both;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-weight: 600;
    }

    .sender-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding-left: 2px;
    }

    .chip:hover {
      background: var(--red-light);
      border-color: var(--red);
    }

    .chip:active { transform: scale(0.97); }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      resize: none;
      line-height: 1.5;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--red); }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: var(--red);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .send-btn:hover { opacity: 0.88; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Footer note ── */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.4;
    }

    /* ── Contact buttons ── */
    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 11px 16px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      max-width: 82%;
      animation: fadeUp 0.25s ease both;
    }

    .contact-btn:hover { background: var(--red-light); border-color: var(--red); }
    .contact-btn:active { transform: scale(0.98); }

    .contact-btn .cb-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-btn.wa .cb-icon { background: #25d366; }
    .contact-btn.email .cb-icon { background: var(--red-light); border: 1px solid var(--red-mid); }

    .contact-btn .cb-icon svg {
      width: 16px;
      height: 16px;
    }

    .contact-btn .cb-text { display: flex; flex-direction: column; gap: 1px; }
    .contact-btn .cb-label { font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .contact-btn .cb-value { font-size: 15px; color: var(--text); }

    /* ── Contact card ── */
    .contact-card {
      margin-top: 10px;
      background: var(--red-light);
      border: 1px solid var(--red-mid);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 13px;
      line-height: 1.6;
    }

    .contact-card a {
      color: var(--red);
      text-decoration: none;
      font-weight: 500;
    }

    .contact-card a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="status-dot"></div>
    <div class="header-text">
      <h1>Parent Assistant</h1>
      <p id="header-sub">Redwood JP · April 2026 reopening</p>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Type your question…"
        rows="1"
        onInput="autoResize(this)"
        onKeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="footer-note">This assistant can make mistakes. For anything urgent or personal, contact the nursery directly.</p>
  </div>
</div>

<script>
  const WORKER_URL = 'https://redwood-api.lunamargherita.com';

  // ── Facts: confirmed by Redwood JP ──
  const CONFIRMED_FACTS = `
CONFIRMED FACTS (from official Redwood JP communication):
- MOE and KHDA have approved reopening. One final declaration is still awaited before full on-site operations resume.
- Tentative reopening date: Monday 20 April 2026, subject to final KHDA confirmation.
- Any changes will be communicated promptly to parents.
- Fees apply from the child's confirmed return date, per nursery policy.
- Children return on their existing schedule (same days and timings as before).
- Meal services are subject to availability from the external provider.
- All arrangements remain subject to government directives and may be adjusted.
- The team will provide extra emotional care during the transition, to help children re-familiarise with the routine, environment, and teachers.
- Emergency contact details must be up to date: local UAE number, someone other than a parent, reachable during nursery hours.

CONTACTS:
When sharing any contact, use these exact tokens. Do not write the number or email in plain text alongside the token. Each token must be on its own line.

Urgent WhatsApp (working hours) — first send a plain text bubble: "For urgent matters, contact the nursery on WhatsApp during working hours", then on separate lines:
[WA:East|971503967190|+971 50 396 7190]
[WA:West|971501072766|+971 50 107 2766]

Landline: +971 4 4538688 (plain text only, no token)

Nurse:
[WA:Nurse|971501072782|+971 50 107 2782]
[EMAIL:Nurse|nurse.jp@theredwoodnursery.com]

Director:
[EMAIL:Suroor Ansari, Director|suroor.ansari@theredwoodnursery.com]

Admin:
[EMAIL:Admin|admin.jp@theredwoodnursery.com]

Admin support:
[EMAIL:Admin Support|adminsupport.jp@theredwoodnursery.com]

Token format: [WA:Label|dialNumber|displayNumber] or [EMAIL:Label|address]. Never mid-sentence.

ATTENDANCE & ABSENCE FOR REOPENING WEEK:
- Parents are not obligated to send their child on Monday if they do not feel ready. The nursery understands this is a personal decision.
- If a child will be absent, parents should notify the nursery in advance. WhatsApp or a message to admin is fine.
- Fees apply from the confirmed return date per the standard nursery policy. Parents with specific questions about fees during the closure or on return should contact admin directly.
- There is no academic penalty for toddlers. Missing a day or a week does not put a child behind.
- If a parent is unsure whether their child is ready, the team is available to talk it through. This is a human conversation, not administrative. The director and key teachers welcome it.
`.trim();

  // ── KFG Safety & Emergency Procedures ──
  const KFG_SAFETY = `
KFG SAFETY & EMERGENCY PROCEDURES (Kids First Group — the group that operates Redwood JP):

OVERVIEW:
Kids First Group operates a centralised safety system across all its nurseries, bringing together leadership, safeguarding, health, facilities, and communications. The Group Compliance Director is Loretta Lynn Riggs. Every nursery operates within this shared framework.

IN AN EMERGENCY:
When an alert is activated, the Site Crisis Lead at each nursery immediately initiates the emergency response. Staff move children to safety — either sheltering indoors or evacuating via pre-identified safe routes, depending on the situation. Every child is accounted for through an immediate headcount and remains supervised and grouped at all times. The nursery reports to Head Office without delay so that oversight and parent communication can begin immediately.

WHAT PARENTS CAN EXPECT DURING AN ALERT:
- Communication comes through official nursery channels only, using verified information. Not unofficial sources.
- Parents are called directly when a child is personally affected or when urgent action is needed.
- Families will be told clearly whether to remain on standby, delay arrival, or follow revised collection instructions.
- If one communication channel is unavailable, the nursery moves to the next approved method to keep information flowing.

PHYSICAL SAFETY MEASURES AT THE NURSERY:
- Designated safe rooms and shelter-in-place procedures are in place.
- Evacuation procedures, safe pick-up and drop-off protocols, and clearly defined safety procedures are established.
- Emergency signage, evacuation maps, internal alarms, and emergency supplies are maintained and accessible.
- 100% of staff have been trained in crisis response procedures and protocols. Regular drills are conducted.
- Each nursery has a Site Crisis Lead and Crisis Team, supported by Head Office Crisis Leads, First Responders, Registered Nurses, Health & Safety Officers, and Education Continuity Teams.

CONTINUITY OF CARE:
Children continue to receive care, supervision, and emotional support whether the nursery is in normal operations, restricted operations, closure, or distance learning. KFG has an Education Continuity Lead and a framework to support learning in all these scenarios. The plan includes safeguarding oversight, wellbeing support, and follow-up for children and families affected by disruption or distress. When it is safe to do so, the plan supports a calm return to familiar routines.
`.trim();


  // ── Psychology knowledge ──
  const PSYCHOLOGY_KNOWLEDGE = `
DEVELOPMENTAL & PSYCHOLOGICAL KNOWLEDGE (back responses with this where relevant):
- Children aged 2-4 are pre-verbal and pre-logical; they process disruption through behaviour (clinginess, regression, sleep changes) not words. This is normal.
- Routine is the primary regulator for toddlers. Predictable sequence matters more than explanation.
- Children co-regulate with adults: a calm, matter-of-fact adult presence is the most evidence-based tool available to a parent.
- Avoid detailed explanations of threats. Children do not need to understand what happened; they need to feel that the adults around them are steady.
- Transition back to nursery may bring separation anxiety that wasn't there before. Brief, confident goodbyes are more effective than prolonged reassurance at drop-off (research: Ainsworth attachment theory; Zero to Three guidelines).
- Regression (thumb-sucking, night waking, wanting to be carried) is a normal stress response in toddlers. It resolves with consistency and patience, not correction.
- Play is how children process big events. If a child re-enacts something frightening, this is therapeutic, not alarming, unless it becomes obsessive.
- Every child is different. What works depends on temperament, prior attachment patterns, and the child's specific sensitivities. There is no single right approach.
- Teachers who know the child are an important resource. Parents should not hesitate to share observations with the nursery team — they are partners in this.
`.trim();

  const SYSTEM_PROMPT = `You are the parent information assistant for Redwood Nursery Jumeirah Park. You help parents with questions about the April 2026 reopening, the nursery's safety arrangements, and how to support their toddlers through the return to routine.

Your voice: calm, clear, professional, and direct. You do not use filler phrases. You do not offer false reassurance. You are competent and you demonstrate it through precision, not performed warmth. You are kind and you know your limits.

STRICT FORMATTING RULES:
- Never use em dashes (-- or -). Use a comma, a short sentence break, or a new sentence instead.
- Maximum 2 paragraphs per response. Give the surface layer first. If the parent wants more, they will ask. This is a conversation, not a briefing document.
- Separate paragraphs with a blank line.
- Never end the final sentence of a bubble with a full stop. It reads as cold and formal. End with a question, an open thought, or simply trail off naturally.
- Bold text sparingly: only when naming a specific technique, concept, or action the parent should remember. Example: "One approach is called **sportscasting** -- narrating what you see without judgment". Use *word* syntax for bold.
- Never write a wall of text. Short is almost always better.
- At the end of your response, offer one natural thread to pull on, either a question or a soft suggestion. One only.

Rules:
1. Use CONFIRMED FACTS freely. They are official nursery communications.
2. Use KFG SAFETY & EMERGENCY PROCEDURES freely. This is confirmed group policy and applies to Redwood JP as a KFG nursery.
3. When drawing on developmental or psychological knowledge, ground it briefly without being academic. Always note that every child is different and the nursery team can help find the right approach.
4. If you do not know something, say so. Do not speculate. Direct to the right contact.
5. Urgent or medical matters: direct to WhatsApp using the token format. Output the text context first, then the tokens on separate lines.
6. Administrative questions (fees, schedule, records): admin.jp@theredwoodnursery.com.
7. For anything needing a human: remind parents warmly that staff welcome direct contact.
8. All teachers and staff have received training for emergency situations, including specific preparation in the days before reopening. Mention this where relevant.
9. Do not say "great question", "I understand", "of course", or any performed empathy. Just answer.
10. Never invent facts about the nursery not in your knowledge base.
11. You do not have access to any individual child's records. Say so only if asked about their specific child's situation. Do not volunteer this proactively.
12. If asked why Parent Assistant exists: the Redwood JP team is focused on preparing the nursery for the children's return. They knew parents would have questions. Parent Assistant gives families immediate access to answers without waiting for an email reply from a team that is hands-on getting everything ready. The focus is always the children. When children are back in person, staff will be busier than ever, and this is one way the nursery is trying to support families through a demanding moment.
13. If a parent expresses hesitation about sending their child back, do not reassure them that it will be fine. Acknowledge that it is a legitimate decision, give them the factual position (no obligation, notify nursery, fees question goes to admin), and offer the option to talk to the team directly. Do not push them toward sending the child. Do not push them away from it. Stay neutral and practical.

${CONFIRMED_FACTS}

${KFG_SAFETY}

${PSYCHOLOGY_KNOWLEDGE}`;

  let history = [];
  let waiting = false;

  const MAIN_CHIPS = [
    'What happens if there\'s an alert during nursery hours?',
    'My child is struggling: what do I do?',
    'What do I need for Monday morning?'
  ];

  const WA_ICON = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.121 1.535 5.857L.057 23.743a.75.75 0 0 0 .921.921l5.886-1.478A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.502-5.2-1.379l-.374-.214-3.873.972.991-3.771-.234-.389A9.953 9.953 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

  const EMAIL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="rgb(121,21,22)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>`;

  function makeContactButton(type, label, value, display) {
    const a = document.createElement('a');
    a.className = `contact-btn ${type}`;
    if (type === 'wa') {
      a.href = `https://wa.me/${value}`;
    } else {
      a.href = `mailto:${value}`;
    }
    a.target = '_blank';
    a.rel = 'noopener';

    const icon = document.createElement('div');
    icon.className = 'cb-icon';
    icon.innerHTML = type === 'wa' ? WA_ICON : EMAIL_ICON;

    const text = document.createElement('div');
    text.className = 'cb-text';
    text.innerHTML = `<span class="cb-label">${label}</span><span class="cb-value">${display || value}</span>`;

    a.appendChild(icon);
    a.appendChild(text);
    return a;
  }

  // ── Render multiple bubbles with staggered typing reveals ──
  function renderBotBubbles(text, showSender) {
    // Split full text into lines first, then group into paragraphs or token lines
    const rawParagraphs = text
      .split(/\n\n+/)
      .map(p => p.trim())
      .filter(Boolean);

    // Further split paragraphs that contain token lines into separate items
    const segments = [];
    rawParagraphs.forEach(para => {
      const lines = para.split('\n').map(l => l.trim()).filter(Boolean);
      let textBuffer = [];
      lines.forEach(line => {
        if (/^\[WA:/.test(line) || /^\[EMAIL:/.test(line)) {
          if (textBuffer.length) { segments.push({ type: 'text', content: textBuffer.join('\n') }); textBuffer = []; }
          segments.push({ type: 'token', content: line });
        } else {
          textBuffer.push(line);
        }
      });
      if (textBuffer.length) segments.push({ type: 'text', content: textBuffer.join('\n') });
    });

    segments.forEach((seg, i) => {
      const delay = i === 0 ? 0 : i * 1100;

      setTimeout(() => {
        const existing = document.getElementById('typing-inter');
        if (existing) existing.parentElement.remove();

        if (i === segments.length - 1) setHeaderTyping(false);

        const wrapper = document.createElement('div');

        if (showSender && i === 0) {
          const label = document.createElement('div');
          label.className = 'sender-label';
          label.textContent = 'Parent Assistant';
          wrapper.appendChild(label);
        }

        if (seg.type === 'token') {
          const waMatch = seg.content.match(/^\[WA:([^|]+)\|([^|]+)\|([^\]]+)\]$/);
          const emailMatch = seg.content.match(/^\[EMAIL:([^|]+)\|([^\]]+)\]$/);

          if (waMatch) {
            wrapper.appendChild(makeContactButton('wa', waMatch[1], waMatch[2], waMatch[3]));
          } else if (emailMatch) {
            wrapper.appendChild(makeContactButton('email', emailMatch[1], emailMatch[2], emailMatch[2]));
          }
        } else {
          const row = document.createElement('div');
          row.className = 'bubble-row';
          const bubble = document.createElement('div');
          bubble.className = 'bubble bot';

          const p = document.createElement('div');
          p.innerHTML = formatText(seg.content);
          bubble.appendChild(p);
          row.appendChild(bubble);
          wrapper.appendChild(row);
        }

        appendNode(wrapper);

        if (i < segments.length - 1) {
          setTimeout(() => {
            setHeaderTyping(true);
            const typRow = document.createElement('div');
            typRow.className = 'bubble-row';
            const tb = document.createElement('div');
            tb.className = 'typing-bubble';
            tb.id = 'typing-inter';
            tb.innerHTML = '<span></span><span></span><span></span>';
            typRow.appendChild(tb);
            appendNode(typRow);
          }, 200);
        }
      }, delay);
    });

    return segments.length * 1100;
  }

  function renderUser(text) {
    const row = document.createElement('div');
    row.className = 'bubble-row user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble user';
    bubble.textContent = text;
    row.appendChild(bubble);
    return row;
  }

  function renderTyping() {
    setHeaderTyping(true);
    const row = document.createElement('div');
    row.className = 'bubble-row';
    const b = document.createElement('div');
    b.className = 'typing-bubble';
    b.id = 'typing';
    b.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(b);
    return row;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function appendNode(node) {
    document.getElementById('messages').appendChild(node);
    scrollBottom();
  }

  // ── Chips ──
  function renderChips(options) {
    const row = document.createElement('div');
    row.className = 'chips-row';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = opt;
      btn.onclick = () => {
        row.remove();
        sendMessage(opt);
      };
      row.appendChild(btn);
    });
    document.getElementById('messages').appendChild(row);
    scrollBottom();
  }

  function setHeaderTyping(on) {
    const sub = document.getElementById('header-sub');
    if (sub) sub.textContent = on ? 'is typing...' : 'Redwood JP · April 2026 reopening';
    if (sub) sub.style.color = on ? 'var(--sage)' : '';
  }

  // ── Intro ──
  function showIntro() {
    const intros = [
      "Hi, I'm the Redwood JP parent assistant. I'm here to answer your questions about the nursery reopening on Monday 20th",
      "I can walk you through what you need to know about the reopening, how the nursery has prepared, and how to help your child settle back in"
    ];

    intros.forEach((text, i) => {
      setTimeout(() => {
        const existing = document.getElementById('typing-inter');
        if (existing) existing.parentElement.remove();

        const wrapper = document.createElement('div');

        if (i === 0) {
          const label = document.createElement('div');
          label.className = 'sender-label';
          label.textContent = 'Parent Assistant';
          wrapper.appendChild(label);
        }

        const row = document.createElement('div');
        row.className = 'bubble-row';
        const bub = document.createElement('div');
        bub.className = 'bubble bot';
        bub.innerHTML = formatText(text);
        row.appendChild(bub);
        wrapper.appendChild(row);
        appendNode(wrapper);

        if (i < intros.length - 1) {
          setTimeout(() => {
            const typRow = document.createElement('div');
            typRow.className = 'bubble-row';
            const tb = document.createElement('div');
            tb.className = 'typing-bubble';
            tb.id = 'typing-inter';
            tb.innerHTML = '<span></span><span></span><span></span>';
            typRow.appendChild(tb);
            appendNode(typRow);
          }, 200);
        }

        if (i === intros.length - 1) {
          setTimeout(() => renderChips(MAIN_CHIPS), 600);
        }
      }, i * 1600);
    });
  }

  // ── Send ──
  async function sendMessage(override) {
    if (waiting) return;
    const input = document.getElementById('input');
    const text = override || input.value.trim();
    if (!text) return;

    document.querySelectorAll('.chips-row').forEach(c => c.remove());

    if (!override) input.value = '';
    autoResize(input);

    appendNode(renderUser(text));
    history.push({ role: 'user', content: text });

    waiting = true;
    document.getElementById('send-btn').disabled = true;
    const typingRow = renderTyping();
    appendNode(typingRow);

    try {
      const res = await fetch(`${WORKER_URL}/parent-chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, system: SYSTEM_PROMPT })
      });

      const data = await res.json();
      typingRow.remove();
      setHeaderTyping(false);

      const reply = data.content?.[0]?.text || data.reply || 'Sorry, something went wrong. Please contact the nursery directly.';

      history.push({ role: 'assistant', content: reply });

      const isFirst = history.filter(m => m.role === 'assistant').length === 1;
      const duration = renderBotBubbles(reply, isFirst);

      // Re-show unused chips after bubbles finish
      const usedChip = MAIN_CHIPS.find(c => text === c);
      if (usedChip && history.length <= 4) {
        setTimeout(() => {
          const remaining = MAIN_CHIPS.filter(c => c !== usedChip);
          const hint = document.createElement('div');
          hint.className = 'bubble-row';
          const hintBub = document.createElement('div');
          hintBub.className = 'bubble bot';
          hintBub.innerHTML = formatText('There are a couple of other topics parents have been asking about too:');
          hint.appendChild(hintBub);
          appendNode(hint);
          setTimeout(() => renderChips(remaining), 200);
        }, duration + 400);
      }

    } catch (e) {
      typingRow.remove();
      setHeaderTyping(false);
      renderBotBubbles(
        "I'm not able to respond right now.\n\nFor immediate questions, please contact the nursery on WhatsApp: <a href=\"https://wa.me/971503967190\">+971 50 396 7190</a> (East) or <a href=\"https://wa.me/971501072766\">+971 50 107 2766</a> (West).",
        false
      );
    }

    waiting = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  showIntro();
</script>
</body>
</html>
